cabs:
  smoovie:
    flavour: python
    command: kremetart.core.smoovie.smoovie
    name: smoovie
    info:
      Render a TART HDF sequence into a HEALPix all-sky movie.
    image: ghcr.io/landmanbester/kremetart:actually_make_movie
    inputs:
      hdf-dir:
        info:
          Directory of input TART HDF snapshots
        dtype: Optional[str]
        type: Directory
      nside:
        info:
          HEALPix nside resolution.
        dtype: int
        default: 128
      fps:
        info:
          Frames per second.
        dtype: int
        default: 2
      cmap:
        info:
          Matplotlib colormap.
        default: inferno
      phase-ra-deg:
        info:
          Common phase-direction RA (deg, ICRS); auto from global mid-time zenith if unset.
        dtype: Optional[float]
      phase-dec-deg:
        info:
          Common phase-direction Dec (deg, ICRS); auto from global mid-time zenith if unset.
        dtype: Optional[float]
    outputs:
      movie:
        dtype: File
        info:
          Output mp4 movie
