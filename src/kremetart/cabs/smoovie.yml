cabs:
  smoovie:
    flavour: python
    command: kremetart.core.smoovie.smoovie
    name: smoovie
    info:
      Image a TART HDF sequence into HEALPix maps and stream them to a live web viewer.
    image: ghcr.io/landmanbester/kremetart:calibration
    inputs:
      hdf-dir:
        info:
          Directory of input TART HDF snapshots
        dtype: Optional[str]
        type: Directory
      nside:
        info:
          HEALPix nside resolution.
        dtype: int
        default: 128
      phase-ra-deg:
        info:
          Common phase-direction RA (deg, ICRS); auto from global mid-time zenith if unset.
        dtype: Optional[float]
      phase-dec-deg:
        info:
          Common phase-direction Dec (deg, ICRS); auto from global mid-time zenith if unset.
        dtype: Optional[float]
      correct-gains:
        info:
          Apply the inverse per-antenna gain solution before imaging.
        dtype: bool
        default: false
      overlay-catalog:
        info:
          Overlay TART catalog satellite tracks on the live sphere (requires network).
        dtype: bool
        default: false
      catalog-elevation-deg:
        info:
          Elevation cutoff (deg) for catalog sources to overlay.
        dtype: float
        default: 45.0
      catalog-cache:
        info:
          Catalog cache zarr path; defaults to <output>.catalog.zarr.
        dtype: Optional[str]
      profile:
        info:
          Print a per-stage timing summary.
        dtype: bool
        default: false
      iwp-sigma:
        info:
          IWP driving variance (sigma^2) for the per-pixel Kalman filter.
        dtype: float
        default: 0.001
      iwp-noise:
        info:
          Measurement-noise variance (R) for the per-pixel Kalman filter.
        dtype: float
        default: 0.01
      apply-beam:
        info:
          Fold the Airy primary beam into the measurement operator (image the intrinsic sky).
        dtype: bool
        default: true
      ground-plane-diameter:
        info:
          Airy aperture (ground plane) diameter in metres.
        dtype: float
        default: 0.125
      eta:
        info:
          Tikhonov regularisation strength (fraction of weight sum); inserts a CG deconvolution stage.
        dtype: Optional[float]
      regulariser:
        info:
          'Deconvolution regulariser when eta>0: tikhonov (CG, default) or l1 (reweighted-L1 FISTA).'
        default: tikhonov
      overwrite:
        info:
          Overwrite the output zarr if it already exists.
        dtype: bool
        default: false
      nframes:
        info:
          Cap the number of frames imaged (profiling/preview aid).
        dtype: Optional[int]
      serve:
        info:
          Serve the live web viewer (use --no-serve for headless/batch runs).
        dtype: bool
        default: true
      port:
        info:
          Port for the live web viewer.
        dtype: int
        default: 8080
      open-browser:
        info:
          Open the live web viewer in a browser on startup.
        dtype: bool
        default: false
    outputs:
      output:
        dtype: Directory
        info:
          Output HEALPix (TIME, PIX) zarr
