version: 2
updates:
  # Monitor Python dependencies (uv ecosystem keeps uv.lock in sync, unlike pip)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
